<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="utf-8"> 
<meta name="viewport" content="width=device-width,initial-scale=1"> 
<title>Live Stream - Updated</title> 
<meta name="referrer" content="no-referrer"> 
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script> 
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/> 

<style> 
*{margin:0;padding:0;box-sizing:border-box} 
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif} 

.shaka-video-container{ 
position:fixed; 
inset:0; 
background:#000; 
display:flex; 
align-items:center; 
justify-content:center; 
} 

video{ 
width:100%; 
height:100%; 
object-fit:contain; 
background:#000; 
} 

.block-overlay{ 
position:fixed; 
inset:0; 
z-index:99999; 
display:flex; 
align-items:center; 
justify-content:center; 
background:radial-gradient(circle at center, #1a1a1a 0%, #000000 100%); 
text-align:center; 
} 

.block-box{ 
padding:40px; 
max-width:500px; 
width:90%; 
background:rgba(20, 20, 20, 0.95); 
border-radius:16px; 
border:1px solid rgba(255, 255, 255, 0.1); 
box-shadow:0 20px 50px rgba(0,0,0,0.5); 
animation: fadeInUp 0.6s ease-out; 
} 

@keyframes fadeInUp { 
from { opacity: 0; transform: translateY(30px); } 
to { opacity: 1; transform: translateY(0); } 
} 

.block-title{ 
font-size:42px; 
font-weight:800; 
color:#ffffff; 
text-transform:uppercase; 
letter-spacing:2px; 
margin-bottom:20px; 
} 

.block-sub{ 
font-size:14px; 
font-weight:500; 
color:rgba(255, 255, 255, 0.6); 
line-height:1.6; 
} 

@media(max-width:700px){ 
.block-title{font-size:28px} 
.block-box{padding:25px} 
} 
</style> 
</head> 
<body> 

<div class="shaka-video-container" id="player-container"> 
<video id="video" autoplay muted playsinline preload="metadata"></video> 
</div> 

<script> 
(function(){ 

// --- 1. SANDBOX CHECK ---
function isSandboxedEnv(){ 
try { 
if (window.self === window.top) return false; 
if (window.frameElement && window.frameElement.hasAttribute("sandbox")) return true; 
return false; 
} catch(e) { return true; } 
} 

function triggerBlockScreen(title, message){ 
const container = document.getElementById("player-container"); 
const video = document.getElementById("video"); 
try { video.pause(); video.removeAttribute('src'); video.load(); } catch(e){} 

const overlay = document.createElement("div"); 
overlay.className = "block-overlay"; 
overlay.innerHTML = `<div class="block-box"><div class="block-title">${title}</div><div class="block-sub">${message}</div></div>`; 
document.body.appendChild(overlay); 
container.style.display = 'none'; 
} 

if(isSandboxedEnv()){ 
triggerBlockScreen('Disable Sandbox', 'Please open this link directly in Chrome Browser.'); 
return; 
} 

// --- 2. UPDATED CONFIG WITH NEW URL & KEYS ---
const CONFIG={ 
streamUrl:"https://a96aivottlinear-a.akamaihd.net/OTTB/iad-nitro/enc/azwuqtlxfr/out/v1/78eb78ea2c374576ba1ff8a6df562586/cenc.mpd", 
keyId:"50195344b760466888f9086d43b639b4", 
key:"97497ea2d101d957f291271247c53cdf"
}; 

document.addEventListener("DOMContentLoaded",async()=>{ 
shaka.polyfill.installAll(); 
if(!shaka.Player.isBrowserSupported()) return; 

const video=document.getElementById("video"); 
const container=document.getElementById("player-container"); 

const player=new shaka.Player(); 
await player.attach(video); 

const ui=new shaka.ui.Overlay(player,container,video); 
ui.configure({ 
addBigPlayButton: true, 
controlPanelElements: ["mute", "play_pause", "time_and_duration", "spacer", "quality", "picture_in_picture", "fullscreen"] 
}); 

player.configure({ 
drm:{clearKeys:{[CONFIG.keyId]:CONFIG.key}}, 
manifest:{defaultPresentationDelay:5}, 
streaming:{ lowLatencyMode:true, bufferingGoal:10, rebufferingGoal:2, safeSeekOffset:5 } 
}); 

// Headers for Akamai/Jio stability
player.getNetworkingEngine().registerRequestFilter((type,request)=>{ 
request.headers["Referer"]="https://www.jiotv.com/"; 
request.headers["User-Agent"]="plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6"; 
}); 

try{ 
await player.load(CONFIG.streamUrl); 
video.play().catch(()=>{}); 
}catch(e){
    console.error("Load failed", e);
} 

video.addEventListener("play",()=>{ video.muted=false; }); 
}); 
})(); 
</script> 
</body> 
</html>
