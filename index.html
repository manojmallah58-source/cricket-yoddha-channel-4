<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Clean Stream Player</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #player-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div data-shaka-player-container id="player-container">
    <video data-shaka-player id="video" autoplay playsinline></video>
</div>

<script>
const manifestUri = 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/nk2wxfedpq/out/v1/b7421a8cb3db4905b5b4abfc0e4d66c0/cenc.mpd';
const keyId = '58ca11783371eb92b94f380587be997c';
const key = '2bf17be97a1846b73b36f4aa33f6c6a8';

async function initPlayer() {
    // Install built-in polyfills to patch browser incompatibilities.
    shaka.polyfill.installAll();

    // Check to see if the browser supports the basic APIs Shaka needs.
    if (!shaka.Player.isBrowserSupported()) {
        console.error('Browser not supported!');
        return;
    }

    const video = document.getElementById('video');
    const container = document.getElementById('player-container');
    const player = new shaka.Player(video);

    // Setting up the UI
    const ui = new shaka.ui.Overlay(player, container, video);
    ui.configure({
        'controlPanelElements': ['play_pause', 'time_and_duration', 'spacer', 'mute', 'volume', 'quality', 'fullscreen'],
        'addBigPlayButton': true
    });

    // Configure DRM ClearKeys
    player.configure({
        drm: {
            clearKeys: {
                [keyId]: key
            }
        },
        streaming: {
            lowLatencyMode: true,
            bufferingGoal: 15
        }
    });

    // Error handling
    player.addEventListener('error', (event) => console.error('Error code', event.detail.code, 'object', event.detail));

    // Load the stream
    try {
        await player.load(manifestUri);
        console.log('The video has now been loaded!');
    } catch (e) {
        console.error('Unable to load!', e);
    }
}

document.addEventListener('shaka-ui-loaded', initPlayer);
</script>
</body>
</html>
